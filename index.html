<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Serum Monitoru</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .container {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  video {
    width: 100%;
    height: 60vh;
    object-fit: cover;
    background: #000;
  }
  canvas.hidden { display: none; }
  .detection-box {
    position: absolute;
    top: 20%;
    left: 30%;
    width: 40%;
    height: 25%;
    border: 2px solid #4ade80;
    border-radius: 8px;
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.3);
  }
  .detection-box.alert {
    border-color: #ef4444;
    animation: pulse 0.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .stats {
    background: #1a1a1a;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat {
    background: #262626;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
  }
  .stat-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 600;
  }
  .status {
    padding: 16px;
    text-align: center;
    font-size: 16px;
    font-weight: 500;
    background: #065f46;
    color: #fff;
  }
  .status.warning { background: #854d0e; }
  .status.alert {
    background: #991b1b;
    animation: alertPulse 0.5s infinite;
  }
  @keyframes alertPulse {
    0%, 100% { background: #991b1b; }
    50% { background: #dc2626; }
  }
  .controls {
    padding: 16px;
    display: flex;
    gap: 8px;
    background: #1a1a1a;
  }
  button {
    flex: 1;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: #fff;
    cursor: pointer;
  }
  button.stop { background: #dc2626; }
  button.secondary { background: #374151; }
  button:disabled { opacity: 0.4; }
  .settings {
    padding: 16px;
    background: #1a1a1a;
    border-top: 1px solid #262626;
  }
  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .setting-row label {
    flex: 1;
    font-size: 14px;
    color: #d1d5db;
  }
  .setting-row input[type="range"] {
    flex: 1;
  }
  .setting-row span {
    min-width: 50px;
    text-align: right;
    font-size: 14px;
    font-weight: 500;
  }
  .instructions {
    padding: 16px;
    background: #1e3a8a;
    font-size: 13px;
    line-height: 1.5;
  }
  .instructions strong { display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="container">
  <div style="position: relative;">
    <video id="video" autoplay playsinline muted></video>
    <div class="detection-box" id="detectionBox"></div>
  </div>

  <div class="status" id="status">Kameranı başladın</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Son damcı</div>
      <div class="stat-value" id="lastDrop">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Hərəkət səviyyəsi</div>
      <div class="stat-value" id="motionLevel">0</div>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn">Başlat</button>
    <button id="stopBtn" class="stop" disabled>Dayandır</button>
    <button id="testBtn" class="secondary">Səs testi</button>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label>Həssaslıq</label>
      <input type="range" id="sensitivity" min="5" max="50" value="15">
      <span id="sensitivityVal">15</span>
    </div>
    <div class="setting-row">
      <label>Xəbərdarlıq gecikməsi (san)</label>
      <input type="range" id="alertDelay" min="5" max="60" value="15">
      <span id="alertDelayVal">15s</span>
    </div>
  </div>

  <div class="instructions">
    <strong>Necə istifadə etməli:</strong>
    Telefonu stativ üzərində damcı kamerasına yaxın yerləşdirin. Yaşıl çərçivəni damcı kamerasının üstünə tuşlayın. "Başlat" düyməsini basın. Damcılar dayananda telefon sizi xəbərdar edəcək.
  </div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const testBtn = document.getElementById('testBtn');
  const statusEl = document.getElementById('status');
  const lastDropEl = document.getElementById('lastDrop');
  const motionLevelEl = document.getElementById('motionLevel');
  const detectionBox = document.getElementById('detectionBox');
  const sensitivitySlider = document.getElementById('sensitivity');
  const alertDelaySlider = document.getElementById('alertDelay');

  let stream = null;
  let previousFrame = null;
  let monitoring = false;
  let lastDropTime = null;
  let alertActive = false;
  let audioCtx = null;
  let alarmInterval = null;
  let wakeLock = null;

  sensitivitySlider.oninput = () => {
    document.getElementById('sensitivityVal').textContent = sensitivitySlider.value;
  };
  alertDelaySlider.oninput = () => {
    document.getElementById('alertDelayVal').textContent = alertDelaySlider.value + 's';
  };

  function playBeep(frequency = 800, duration = 200) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = frequency;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration/1000);
    osc.start();
    osc.stop(audioCtx.currentTime + duration/1000);
  }

  function startAlarm() {
    if (alarmInterval) return;
    alertActive = true;
    statusEl.className = 'status alert';
    statusEl.textContent = 'XƏBƏRDARLIQ! Damcı dayanıb!';
    detectionBox.classList.add('alert');
    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
    alarmInterval = setInterval(() => {
      playBeep(1000, 300);
      setTimeout(() => playBeep(1200, 300), 400);
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }, 1200);
  }

  function stopAlarm() {
    if (alarmInterval) {
      clearInterval(alarmInterval);
      alarmInterval = null;
    }
    alertActive = false;
    detectionBox.classList.remove('alert');
  }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) { console.log('Wake lock failed:', e); }
  }

  async function start() {
    try {
      // Try back camera first, fall back to any camera
      let constraints = {
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      };
      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }

      video.srcObject = stream;
      video.setAttribute('autoplay', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('muted', '');

      // Wait for video to be ready - use multiple events for compatibility
      await new Promise((resolve, reject) => {
        let resolved = false;
        const done = () => { if (!resolved) { resolved = true; resolve(); } };
        video.onloadedmetadata = done;
        video.onloadeddata = done;
        video.oncanplay = done;
        setTimeout(done, 3000); // Fallback timeout
      });

      // Explicitly play - required on many Android devices
      try { await video.play(); } catch (e) { console.log('Auto-play:', e); }

      // Wait a moment for video dimensions to stabilize
      await new Promise(r => setTimeout(r, 500));

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      await requestWakeLock();

      monitoring = true;
      previousFrame = null;
      lastDropTime = Date.now();
      startBtn.disabled = true;
      stopBtn.disabled = false;
      statusEl.className = 'status';
      statusEl.textContent = 'İzlənilir... Damcı gözlənilir';

      detectLoop();
    } catch (err) {
      alert('Kamera əlçatan deyil: ' + err.message);
    }
  }

  function stop() {
    monitoring = false;
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    if (wakeLock) {
      wakeLock.release();
      wakeLock = null;
    }
    stopAlarm();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusEl.className = 'status';
    statusEl.textContent = 'Dayandırıldı';
    motionLevelEl.textContent = '0';
  }

  function detectLoop() {
    if (!monitoring) return;

    const w = canvas.width;
    const h = canvas.height;
    ctx.drawImage(video, 0, 0, w, h);

    // Detection zone: center area (30-70% x, 20-45% y) matching the green box
    const zx = Math.floor(w * 0.30);
    const zy = Math.floor(h * 0.20);
    const zw = Math.floor(w * 0.40);
    const zh = Math.floor(h * 0.25);
    
    const current = ctx.getImageData(zx, zy, zw, zh);
    
    if (previousFrame) {
      let diffSum = 0;
      const data1 = current.data;
      const data2 = previousFrame.data;
      const len = data1.length;
      
      // Sample every 4th pixel for performance
      for (let i = 0; i < len; i += 16) {
        const diff = Math.abs(data1[i] - data2[i]) +
                     Math.abs(data1[i+1] - data2[i+1]) +
                     Math.abs(data1[i+2] - data2[i+2]);
        diffSum += diff;
      }
      
      const motionLevel = Math.round(diffSum / (len / 16) / 3);
      motionLevelEl.textContent = motionLevel;
      
      const threshold = parseInt(sensitivitySlider.value);
      const alertDelaySec = parseInt(alertDelaySlider.value);
      
      if (motionLevel > threshold) {
        // Drop detected
        lastDropTime = Date.now();
        const now = new Date();
        lastDropEl.textContent = now.toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        if (alertActive) {
          stopAlarm();
          statusEl.className = 'status';
          statusEl.textContent = 'İzlənilir... Damcı davam edir';
        }
      } else if (lastDropTime) {
        const elapsed = (Date.now() - lastDropTime) / 1000;
        
        if (elapsed > alertDelaySec && !alertActive) {
          startAlarm();
        } else if (elapsed > alertDelaySec / 2 && !alertActive) {
          statusEl.className = 'status warning';
          statusEl.textContent = `Diqqət: ${Math.round(elapsed)}s damcı yoxdur`;
        }
      }
    }
    
    previousFrame = current;
    requestAnimationFrame(detectLoop);
  }

  startBtn.onclick = start;
  stopBtn.onclick = stop;
  testBtn.onclick = () => {
    playBeep(1000, 300);
    setTimeout(() => playBeep(1200, 300), 400);
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  };

  // Re-request wake lock when page becomes visible again
  document.addEventListener('visibilitychange', async () => {
    if (monitoring && document.visibilityState === 'visible') {
      await requestWakeLock();
    }
  });
</script>

</body>
</html>
